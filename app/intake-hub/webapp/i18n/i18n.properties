appTitle=Intake Hub
appDescription=Upload source documents and run AI extraction

#XTIT: Title of the upload dialog
uploadDialogTitle=Upload Document
#XFLD: Label for the target workspace picker
uploadWorkspaceLabel=Target Workspace
#XTOL: Tooltip on the inline "create workspace" button
uploadNewWorkspaceTooltip=Create a new workspace
#XFLD: Label for the document origin type
uploadOriginTypeLabel=Origin Type
#XSEL: Origin type - pasted plain text
originTypeText=Plain Text
#XSEL: Origin type - email message
originTypeEmail=Email
#XSEL: Origin type - spreadsheet or delimited table
originTypeExcel=Excel (CSV/TSV/XLSX)
#XSEL: Origin type - structured REST payload
originTypeRestApi=REST API (JSON)
#XSEL: Origin type - PDF document
originTypePdf=PDF
#XSEL: Origin type - scanned image (OCR not yet available)
originTypeImage=Image (metadata only)
#XFLD: Label for the file name field
uploadFileNameLabel=File Name
#XFLD: Label for the file type field
uploadFileTypeLabel=File Type
#XFLD: Label for the pasted-content text area
uploadContentLabel=Content
#XFLD: Label for the file picker
uploadFileLabel=File
#XTOL: Placeholder for the file name input
uploadFileNamePlaceholder=e.g. lab-request.eml
#XTOL: Placeholder for the file type input
uploadFileTypePlaceholder=e.g. eml, csv, json
#XTOL: Placeholder for the raw content text area
uploadContentPlaceholder=Paste the document's raw text (email body, CSV rows, JSON payload), or choose a file above.
#XMSG: Hint shown under the file picker; {0} is the max size in MB
uploadFileHint=Select a PDF, CSV, TSV, EML, JSON, TXT, MD or XML file (max {0} MB), or paste text below.
#XBUT: Confirm button of the upload dialog
uploadConfirmButton=Upload
#XBUT: Generic cancel button
cancelButton=Cancel
#XCKL: Opt-in to run AI extraction right after upload
uploadAutoExtract=Run AI extraction immediately after upload

#XTIT: Title of the inline "new workspace" dialog
newWorkspaceDialogTitle=New Requirement Workspace
#XFLD: Label for the new workspace title
newWorkspaceTitleLabel=Title
#XTOL: Placeholder for the new workspace title
newWorkspaceTitlePlaceholder=e.g. Q4 Lab Equipment
#XBUT: Create button of the new workspace dialog
newWorkspaceCreateButton=Create
#XMSG: Toast after creating a workspace; {0} is the workspace title
newWorkspaceCreated=Workspace "{0}" created.
#XMSG: Error when workspace creation fails
newWorkspaceFailed=Could not create workspace.

#XTIT: Title of the change-workspace dialog
changeWorkspaceDialogTitle=Change Workspace
#XFLD: Label for the target workspace of a move
changeWorkspaceLabel=Move to workspace
#XBUT: Confirm button of the change-workspace dialog
changeWorkspaceButton=Move
#XMSG: Toast after moving a document
changeWorkspaceSuccess=Document moved to the selected workspace.
#XMSG: Error when the move fails
changeWorkspaceFailed=Could not move document.
#XMSG: Shown when the document is already in the chosen workspace
changeWorkspaceSameTarget=The document is already in that workspace.

#XMSG: Validation - no workspace chosen
validationNoWorkspace=Please choose a target workspace.
#XMSG: Validation - no file name entered
validationNoFileName=Please enter a file name.
#XMSG: Validation - neither a file nor pasted content was provided
validationNoContent=Please choose a file or paste some content.
#XMSG: Validation - the chosen file exceeds the size cap; {0} is the max size in MB
validationFileTooLarge=That file is larger than the {0} MB limit.
#XMSG: Validation - the chosen file's extension is not supported; {0} is the accepted list
validationFileTypeUnsupported=That file type isn't supported. Please choose one of: {0}.

#XMSG: Toast after a successful upload
uploadSuccess=Document uploaded. Open it to run extraction.
#XMSG: Error when the upload fails
uploadFailed=Upload failed.

#XBUT: Extract requirements button
extractButton=Extract Requirements
#XBUT: Change workspace button
changeWorkspaceActionButton=Change Workspace
#XTIT: Title of the success dialog after extraction
extractedTitle=Extracted
#XMSG: Success message after extraction; {0} is the number of requirements
extractSuccess={0} requirement(s) created in the Workspace.
#XBUT: Action opening the Requirement Workspace app
openWorkspaceAction=Open Workspace
#XMSG: Shown when extraction ends in FAILED status
extractFailedStatus=Extraction failed. See the Status field below for the error message.
#XMSG: Error when the extract call itself fails
extractFailed=Extraction failed.
#XBUT: Re-check the extraction status of this document
refreshStatusButton=Refresh Status
