appTitle=Requirement Workspace
appDescription=Review, merge, split and enrich AI-extracted requirements, then promote them to a Sourcing Project

# --- Page / workspace picker -------------------------------------------------
#XTIT: Page heading
pageTitle=Requirement Workspace
#XTOL: Tooltip / accessible name of the workspace picker
workspaceSelectTooltip=Select the requirement workspace to curate
#XBUT: Create a new workspace
newWorkspaceButton=New
#XTOL: Tooltip on the create-workspace button
newWorkspaceTooltip=Create a new workspace
#XBUT: Promote the workspace to a Sourcing Project
promoteButton=Promote to Sourcing Project

# --- Filter bar --------------------------------------------------------------
#XFLD: Filter on the requirement description
filterDescription=Description
#XFLD: Filter on the AI status
filterAiStatus=AI Status

# --- Table -------------------------------------------------------------------
#XTIT: Table header
tableHeader=Requirements
#XMSG: Shown when the workspace has no requirements
tableNoData=No requirements in this workspace yet. Upload documents in the Intake Hub and run extraction.
#XCOL: Requirement description
colDescription=Description
#XCOL: Requested quantity
colQuantity=Quantity
#XCOL: Requested delivery date
colRequested=Requested
#XCOL: Assigned material group
colMaterialGroup=Material Group
#XCOL: Assigned commodity code
colCommodity=Commodity
#XCOL: AI confidence score
colConfidence=AI Confidence
#XCOL: AI curation status
colAiStatus=AI Status
#XCOL: Duplicate marker
colDuplicate=Duplicate

# --- Toolbar actions ---------------------------------------------------------
#XBUT: Accept the AI proposal
actionAccept=Accept
#XBUT: Edit the requirement
actionEdit=Edit
#XBUT: Merge the selected requirements
actionMerge=Merge
#XBUT: Split the requirement into two
actionSplit=Split
#XBUT: Reject the AI proposal
actionReject=Reject AI
#XBUT: Re-run AI enrichment
actionEnrichment=Enrichment
#XBUT: Show the source snippets behind the requirement
actionSources=Sources
#XBUT: Delete the selected requirements
actionDelete=Delete

# --- Status / confidence formatters -----------------------------------------
#XFLD: Placeholder shown when a confidence score is missing
confidenceNone=—
#XTOL: Confidence band in words; {0} is the percentage
confidenceHighTooltip=High AI confidence ({0}).
#XTOL: Confidence band in words; {0} is the percentage
confidenceMediumTooltip=Medium AI confidence ({0}) — worth a check.
#XTOL: Confidence band in words; {0} is the percentage
confidenceLowTooltip=Low AI confidence ({0}) — needs review.
#XTOL: Tooltip when no confidence score was recorded
confidenceNoneTooltip=No AI confidence score recorded.
#XFLD: Suffix marking a row that must be reviewed before promotion; {0} is the AI status
aiStatusNeedsReview={0} — review
#XTOL: Tooltip on a row blocking promotion
aiStatusReviewTooltip=Low AI confidence and not yet reviewed — blocks promotion until you Accept, Edit, or Reject it.
#XFLD: Marker for a suspected duplicate row
duplicateMarker=Possible duplicate

# --- Create workspace dialog -------------------------------------------------
#XTIT: Title of the create-workspace dialog
newWorkspaceDialogTitle=New Requirement Workspace
#XFLD: Workspace title field
newWorkspaceTitleLabel=Title
#XTOL: Placeholder for the workspace title
newWorkspaceTitlePlaceholder=e.g. Q4 Lab Equipment
#XBUT: Confirm creating the workspace
createButton=Create
#XBUT: Generic cancel
cancelButton=Cancel
#XBUT: Generic close
closeButton=Close
#XMSG: Toast after creating a workspace; {0} is the title
workspaceCreated=Workspace "{0}" created.

# --- Curation actions --------------------------------------------------------
#XMSG: Toast after accepting; {0} is the number of requirements
acceptedToast={0} requirement(s) accepted.
#XTIT: Title of the merge confirmation
mergeDialogTitle=Merge Requirements
#XMSG: Merge confirmation; {0} is the number of requirements
mergeConfirm=Merge {0} requirements? The first selected row survives and inherits all source links.
#XMSG: Toast after merging
mergedToast=Requirements merged.
#XMSG: Toast after splitting
splitToast=Requirement split — adjust quantities on both rows.
#XMSG: Toast after rejecting the AI proposal
rejectedToast=AI proposal rejected — fields cleared for manual entry.
#XTIT: Title of the delete confirmation
deleteDialogTitle=Delete Requirements
#XMSG: Delete confirmation; {0} is the number of requirements
deleteConfirm=Delete {0} requirement(s)?
#XMSG: Toast after deleting
deletedToast=Deleted.

# --- Enrichment --------------------------------------------------------------
#XMSG: Toast after enriching a single requirement
enrichedSingleToast=AI enrichment regenerated — review the new proposal.
#XTIT: Title of the bulk enrichment progress dialog
enrichProgressTitle=Enriching requirements
#XMSG: Body of the bulk enrichment progress dialog
enrichProgressBody=Running AI enrichment on the selected requirements.
#XMSG: Progress text; {0} done, {1} total
enrichProgressText=Enriching {0} of {1}…
#XMSG: Bulk enrichment succeeded; {0} is the count
enrichSuccess=Enriched {0} requirement(s). Review the new proposals.
#XMSG: Bulk enrichment partly failed; {0} ok, {1} total, {2} failed count, {3} failed names
enrichPartial=Enriched {0} of {1} requirement(s). {2} failed: {3}. Select the failed row(s) and retry.

# --- Promote -----------------------------------------------------------------
#XTIT: Title of the promote confirmation
promoteDialogTitle=Promote to Sourcing Project
#XMSG: Promote confirmation
promoteConfirm=Promote all accepted/edited requirements of this workspace into a new Sourcing Project?
#XTIT: Title of the promoted success dialog
promotedTitle=Promoted
#XMSG: Promote success; {0} is the number of requirements copied
promotedMessage={0} requirement(s) copied into the new Sourcing Project.
#XBUT: Action opening the Sourcing Project app
openProjectAction=Open Project

